<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>App</title>
</head>
<body>
  <div id="root"></div>
  <script>
    function renderApp(state) {
      var root = document.getElementById("root");
      for (var i = 0; i < state.count; i++) {
        root.textContent = "loading " + state.view;
      }
      return root;
    }
    window.addEventListener("DOMContentLoaded", function () {
      renderApp({ view: "home", count: 3 });
    });
  </script>
</body>
</html>
